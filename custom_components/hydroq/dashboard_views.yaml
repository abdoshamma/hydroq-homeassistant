        show_name: true
        show_state: true
        show_icon: true
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Run control
            heading_style: title
            icon: mdi:play-circle
          - type: custom:mushroom-entity-card
            entity: __HQ.auto_irrigation__
            name: Auto irrigation
            icon: mdi:sprinkler-variant
            icon_color: green
            layout: horizontal
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: __HQ.start_irrigation__
