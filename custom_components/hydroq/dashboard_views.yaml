  - type: sections
    max_columns: 4
    title: Calibration
    path: calibration
    icon: mdi:flask-outline
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HAL.water_temp__
        name: Water Temp
        color: cyan
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HAL.ph__
        name: pH
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HAL.tds__
        name: TDS
    sections:
      - type: grid
        column_span: 3
        cards:
          - type: custom:vertical-stack-in-card
            title: pH Calibration
            cards:
              - type: custom:mushroom-title-card
                title: Current Reading
              - type: custom:mushroom-entity-card
                entity: __HAL.ph__
                name: pH Value
                icon: mdi:ph
                primary_info: name
                secondary_info: state
              - type: custom:mushroom-title-card
                title: Calibration Controls
              - type: custom:mushroom-template-card
                primary: Calibrate pH Neutral
                icon: mdi:flask
                icon_color: green
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.cal_ph_neutral__
              - type: custom:mushroom-template-card
                primary: Calibrate pH Acid
                icon: mdi:flask
                icon_color: blue
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.cal_ph_acid__
              - type: custom:mini-graph-card
                entities:
                  - entity: __HAL.ph__
                    name: pH Level
                hours_to_show: 24
                points_per_hour: 30
                line_width: 2
                font_size: 75
                show:
                  points: true
                  fill: true
                  labels: true
                  average: true
                  state: true
          - type: custom:vertical-stack-in-card
            title: TDS / EC Calibration
            cards:
              - type: custom:mushroom-title-card
                title: Current Reading
              - type: custom:mushroom-entity-card
                entity: __HAL.tds__
                name: TDS Value
                icon: mdi:water
                primary_info: name
                secondary_info: state
              - type: custom:mushroom-title-card
                title: Calibration Controls
              - type: custom:mushroom-template-card
                primary: Calibrate EC / TDS
                icon: mdi:flask-outline
                icon_color: blue
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.cal_ec__
              - type: custom:mini-graph-card
                entities:
                  - entity: __HAL.tds__
                    name: TDS Level
                hours_to_show: 24
                points_per_hour: 20
                line_width: 2
                font_size: 75
                show:
                  points: true
                  fill: true
                  labels: true
                  average: true
                  state: true
          - type: custom:vertical-stack-in-card
            title: Dissolved Oxygen
            cards:
              - type: custom:mushroom-title-card
                title: Calibration
              - type: custom:mushroom-template-card
                primary: Air Calibration
                icon: mdi:air-filter
                icon_color: cyan
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.cal_do__
              - type: custom:mushroom-entity-card
                entity: __HQ.last_event__
                name: Last Event
                icon: mdi:history
                primary_info: name
                secondary_info: state
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Last calibrated
            heading_style: title
            icon: mdi:calendar-check
          - type: custom:mushroom-entity-card
            entity: __HQ.last_cal_ph__
            name: Last pH cal
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: __HQ.last_cal_tds__
            name: Last TDS cal
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: __HQ.last_cal_do__
            name: Last DO cal
            layout: horizontal
          - type: heading
            heading: Calibration Tips
            heading_style: title
            icon: mdi:information
          - type: markdown
            content: |
              ### pH
              1. Rinse probe with distilled water
              2. Calibrate Neutral, then Acid

              ### TDS / EC
              1. Clean probe thoroughly
              2. Use standard calibration solution
              3. Wait for stable reading

              ### DO
              1. Clean probe surface
              2. Hold in air, then run Air Calibration


