# HydroQ official operator dashboard (commercial product UI).
# Placeholders resolved at install: __HQ.<key>__  __HAL.<role>__  __HAL.light_N__
# Requires HACS: Mushroom, Bubble Card, Mini Graph Card, Vertical Stack In Card.
#
# Navigation: Overview · Water · Irrigation · Lights · Grow · Alarms · Service · System · Info
# Multi-zone: Zones tab prepended automatically when 2+ HydroQ entries exist.
views:
  # ─── 1. OVERVIEW ───────────────────────────────────────────────────────────
  - type: sections
    max_columns: 4
    title: Overview
    path: home
    icon: mdi:view-dashboard
    badges:
      - type: entity
        entity: __HQ.status__
        name: Status
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.health__
        name: Health
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.water_ok__
        name: Water
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.active_alarm__
        name: Alarm
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.growth_stage__
        name: Stage
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.system_mode__
        name: Mode
        show_name: true
        show_state: true
        show_icon: true
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: __HQ.active_alarm__
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: Active alarm — action required
              secondary: "{{ states('__HQ.last_error__') }}"
              icon: mdi:alert-octagon
              icon_color: red
              layout: horizontal
              tap_action:
                action: navigate
                navigation_path: /hydroq/alarms
              grid_options:
                columns: full
          - type: markdown
            content: |
              <div style="width:100%;display:flex;justify-content:center;align-items:center;margin:0.35rem 0 0.5rem;">
              <img src="/hydroq/logo.png" alt="HydroQ"
              style="display:block;margin:0 auto;max-width:160px;width:42%;height:auto;" />
              </div>
            grid_options:
              columns: full
              rows: 2

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Live readings
            heading_style: title
            icon: mdi:gauge
          - type: gauge
            entity: __HAL.ph__
            name: pH
            min: 4
            max: 8
            needle: true
            severity:
              green: 5.8
              yellow: 5.5
              red: 4
          - type: gauge
            entity: __HAL.tds__
            name: TDS
            min: 0
            max: 2000
            needle: true
            severity:
              green: 400
              yellow: 200
              red: 0
          - type: tile
            entity: __HAL.water_temp__
            name: Water temp
            icon: mdi:thermometer-water
          - type: tile
            entity: __HAL.ec__
            name: EC
            icon: mdi:flash
          - type: tile
            entity: __HAL.do__
            name: Dissolved O₂
            icon: mdi:molecule-co2
          - type: tile
            entity: __HAL.co2__
            name: Air CO₂
            icon: mdi:molecule-co2

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Quick controls
            heading_style: title
            icon: mdi:gesture-tap-button
          - type: custom:mushroom-entity-card
            entity: __HQ.grow_lights__
            name: Grow lights
            icon: mdi:lightbulb-group
            layout: horizontal
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: __HQ.auto_irrigation__
            name: Auto irrigation
            icon: mdi:sprinkler
            layout: horizontal
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: __HQ.start_irrigation__
            name: Start irrigation
            icon: mdi:play-circle
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.start_irrigation__
          - type: custom:mushroom-entity-card
            entity: __HQ.stop_irrigation__
            name: Stop irrigation
            icon: mdi:stop-circle
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.stop_irrigation__
          - type: custom:mushroom-entity-card
            entity: __HQ.start_balance__
            name: Balance system
            icon: mdi:scale-balance
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              confirmation:
                text: Run pH then TDS balance?
              target:
                entity_id: __HQ.start_balance__
          - type: custom:mushroom-entity-card
            entity: __HQ.emergency_stop__
            name: Emergency stop
            icon: mdi:alert-octagon
            icon_color: red
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              confirmation:
                text: Stop all actuators now?
              target:
                entity_id: __HQ.emergency_stop__

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Activity
            heading_style: title
            icon: mdi:pulse
          - type: tile
            entity: __HQ.irrigation_active__
            name: Irrigation
            icon: mdi:water-pump
          - type: tile
            entity: __HQ.irrigation_state__
            name: Irrig. state
            icon: mdi:state-machine
          - type: tile
            entity: __HQ.dosing_active__
            name: Dosing
            icon: mdi:flask
          - type: tile
            entity: __HQ.dosing_state__
            name: Dose state
            icon: mdi:flask-outline
          - type: tile
            entity: __HQ.last_event__
            name: Last event
            icon: mdi:history
            grid_options:
              columns: 6
          - type: tile
            entity: __HQ.last_error__
            name: Last error
            icon: mdi:alert-circle-outline
            grid_options:
              columns: 6

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 24h trends
            heading_style: title
            icon: mdi:chart-timeline-variant
          - type: custom:mini-graph-card
            entities:
              - entity: __HAL.ph__
                name: pH
            hours_to_show: 24
            points_per_hour: 12
            line_width: 2
            font_size: 70
            color_thresholds:
              - value: 5.5
                color: "#c0392b"
              - value: 5.8
                color: "#d4a017"
              - value: 6.0
                color: "#27ae60"
              - value: 6.5
                color: "#d4a017"
              - value: 7.0
                color: "#c0392b"
            show:
              fill: fade
              labels: false
              average: true
              extrema: true
              state: true
            tap_action:
              action: navigate
              navigation_path: /hydroq/water
          - type: custom:mini-graph-card
            entities:
              - entity: __HAL.tds__
                name: TDS
            hours_to_show: 24
            points_per_hour: 12
            line_width: 2
            font_size: 70
            color_thresholds:
              - value: 200
                color: "#2980b9"
              - value: 400
                color: "#27ae60"
              - value: 800
                color: "#d4a017"
              - value: 1500
                color: "#c0392b"
            show:
              fill: fade
              labels: false
              average: true
              extrema: true
              state: true
            tap_action:
              action: navigate
              navigation_path: /hydroq/water
          - type: custom:mini-graph-card
            entities:
              - entity: __HAL.water_temp__
                name: Water °C
            hours_to_show: 24
            points_per_hour: 6
            line_width: 2
            font_size: 70
            show:
              fill: fade
              labels: false
              average: true
              state: true
            tap_action:
              action: navigate
              navigation_path: /hydroq/system

  # ─── 2. WATER QUALITY + DOSING ─────────────────────────────────────────────
  - type: sections
    max_columns: 4
    title: Water
    path: water
    icon: mdi:water-opacity
    badges:
      - type: entity
        entity: __HAL.ph__
        name: pH
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HAL.tds__
        name: TDS
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.dosing_active__
        name: Dosing
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.water_ok__
        name: Water OK
        show_name: true
        show_state: true
        show_icon: true
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: pH
            heading_style: title
            icon: mdi:ph
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:mini-graph-card
                entities:
                  - entity: __HAL.ph__
                    name: pH
                hours_to_show: 24
                points_per_hour: 20
                line_width: 2
                font_size: 75
                color_thresholds:
                  - value: 5.5
                    color: "#c0392b"
                  - value: 5.8
                    color: "#d4a017"
                  - value: 6.0
                    color: "#27ae60"
                  - value: 6.5
                    color: "#d4a017"
                  - value: 7.0
                    color: "#c0392b"
                show:
                  points: false
                  fill: fade
                  labels: true
                  average: true
                  extrema: true
                  state: true
                tap_action:
                  action: more-info
              - type: custom:bubble-card
                card_type: separator
                name: Auto pH
                icon: mdi:refresh-auto
                sub_button:
                  - entity: __HQ.auto_ph__
                    icon: mdi:refresh-auto
                    tap_action:
                      action: toggle
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.desired_ph__
                name: Target pH
                icon: mdi:ph
                show_state: true
                min_value: 4
                max_value: 14
                hold_action:
                  action: more-info
                sub_button:
                  - entity: __HQ.start_ph__
                    name: Dose
                    icon: mdi:play
                    show_name: true
                    tap_action:
                      action: call-service
                      service: button.press
                      confirmation:
                        text: Start pH dosing?
                      target:
                        entity_id: __HQ.start_ph__
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.ph_tolerance__
                name: Tolerance
                show_state: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-fan-card
                    entity: __HAL.ph_up__
                    name: pH Up
                    icon_animation: true
                  - type: custom:mushroom-fan-card
                    entity: __HAL.ph_down__
                    name: pH Down
                    icon_animation: true
                  - type: custom:mushroom-fan-card
                    entity: __HAL.neutralization__
                    name: Neutralize
                    icon_animation: true

          - type: heading
            heading: EC / TDS
            heading_style: title
            icon: mdi:water-percent
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:mini-graph-card
                entities:
                  - entity: __HAL.tds__
                    name: TDS
                hours_to_show: 24
                points_per_hour: 16
                line_width: 2
                font_size: 75
                color_thresholds:
                  - value: 200
                    color: "#2980b9"
                  - value: 400
                    color: "#27ae60"
                  - value: 800
                    color: "#d4a017"
                  - value: 1500
                    color: "#c0392b"
                show:
                  points: false
                  fill: fade
                  labels: true
                  average: true
                  extrema: true
                  state: true
                tap_action:
                  action: more-info
              - type: custom:bubble-card
                card_type: separator
                name: Auto EC
                icon: mdi:refresh-auto
                sub_button:
                  - entity: __HQ.auto_ec__
                    tap_action:
                      action: toggle
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.desired_ec_tds__
                name: Target TDS
                icon: mdi:sprout-outline
                show_state: true
                hold_action:
                  action: more-info
                sub_button:
                  - entity: __HQ.start_nutrients__
                    name: Nutrients
                    icon: mdi:play
                    show_name: true
                    tap_action:
                      action: call-service
                      service: button.press
                      confirmation:
                        text: Dose nutrients A/B toward target?
                      target:
                        entity_id: __HQ.start_nutrients__
                  - entity: __HQ.start_neutralize__
                    name: Lower TDS
                    icon: mdi:water-minus
                    show_name: true
                    tap_action:
                      action: call-service
                      service: button.press
                      confirmation:
                        text: Run neutralize (lower TDS)?
                      target:
                        entity_id: __HQ.start_neutralize__
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.ec_tolerance__
                name: Tolerance
                show_state: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-fan-card
                    entity: __HAL.nutrient_a__
                    name: Pump A
                    icon_animation: true
                  - type: custom:mushroom-fan-card
                    entity: __HAL.nutrient_b__
                    name: Pump B
                    icon_animation: true
                  - type: custom:mushroom-fan-card
                    entity: __HAL.nutrient_c__
                    name: Pump C
                    icon_animation: true

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Dosing actions
            heading_style: title
            icon: mdi:flask
          - type: tile
            entity: __HQ.dosing_state__
            name: State
            icon: mdi:state-machine
          - type: tile
            entity: __HQ.dosing_active__
            name: Active
            icon: mdi:fan-clock
          - type: custom:mushroom-entity-card
            entity: __HQ.start_balance__
            name: Balance
            icon: mdi:scale-balance
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              confirmation:
                text: Balance pH then TDS?
              target:
                entity_id: __HQ.start_balance__
          - type: custom:mushroom-entity-card
            entity: __HQ.stop_dosing__
            name: Stop dosing
            icon: mdi:close-octagon-outline
            icon_color: orange
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.stop_dosing__
          - type: custom:mushroom-entity-card
            entity: __HQ.request_refill__
            name: Request refill
            icon: mdi:water-plus
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.request_refill__

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Reservoir sensors
            heading_style: title
            icon: mdi:barrel
          - type: custom:mini-graph-card
            entities:
              - entity: __HAL.water_temp__
                name: Water °C
            hours_to_show: 48
            points_per_hour: 4
            line_width: 2
            font_size: 70
            show:
              fill: fade
              average: true
              state: true
          - type: custom:mini-graph-card
            entities:
              - entity: __HAL.ec__
                name: EC
            hours_to_show: 48
            points_per_hour: 4
            line_width: 2
            font_size: 70
            show:
              fill: fade
              average: true
              state: true
          - type: custom:mini-graph-card
            entities:
              - entity: __HAL.do__
                name: DO
            hours_to_show: 48
            points_per_hour: 4
            line_width: 2
            font_size: 70
            show:
              fill: fade
              average: true
              state: true
          - type: tile
            entity: __HAL.water_level__
            name: Level switch
            icon: mdi:waves

  # ─── 3. IRRIGATION ─────────────────────────────────────────────────────────
  - type: sections
    max_columns: 4
    title: Irrigation
    path: irrigation
    icon: mdi:water-pump
    badges:
      - type: entity
        entity: __HQ.irrigation_active__
        name: Running
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.irrigation_state__
        name: State
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.water_ok__
        name: Water OK
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: __HQ.auto_irrigation__
        name: Auto
        show_name: true
        show_state: true
        show_icon: true
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Run control
            heading_style: title
            icon: mdi:play-circle
          - type: custom:mushroom-entity-card
            entity: __HQ.auto_irrigation__
            name: Auto irrigation
            icon: mdi:sprinkler-variant
            icon_color: green
            layout: horizontal
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: __HQ.start_irrigation__
            name: Start
            icon: mdi:play-circle
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.start_irrigation__
          - type: custom:mushroom-entity-card
            entity: __HQ.stop_irrigation__
            name: Stop
            icon: mdi:stop-circle
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.stop_irrigation__
          - type: custom:mushroom-entity-card
            entity: __HQ.emergency_stop__
            name: E-Stop
            icon: mdi:alert-octagon
            icon_color: red
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              confirmation:
                text: Emergency stop all actuators?
              target:
                entity_id: __HQ.emergency_stop__

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Status
            heading_style: title
            icon: mdi:information-outline
          - type: tile
            entity: __HQ.irrigation_active__
            name: Currently running
            icon: mdi:water-pump
          - type: tile
            entity: __HQ.irrigation_state__
            name: FSM state
            icon: mdi:state-machine
          - type: tile
            entity: __HQ.water_ok__
            name: Water present
            icon: mdi:water-check
          - type: tile
            entity: __HAL.emergency_stop__
            name: Hardware e-stop
            icon: mdi:skull

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Advanced override
            heading_style: subtitle
            icon: mdi:wrench
          - type: custom:mushroom-entity-card
            entity: __HAL.irrigation__
            name: Manual pump (bypass FSM)
            icon: mdi:water-pump
            icon_color: orange
            layout: horizontal
            tap_action:
              action: toggle
          - type: markdown
            content: >
              Manual pump talks to the controller relay directly and bypasses
              HydroQ schedule / safety FSM. Prefer **Start / Stop** for normal runs.
              Edit daily events on the **Grow** page.

