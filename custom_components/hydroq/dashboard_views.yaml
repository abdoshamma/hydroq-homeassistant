          - type: custom:mushroom-entity-card
            entity: __HQ.stop_irrigation__
            name: Stop
            icon: mdi:stop-circle
            layout: horizontal
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: __HQ.stop_irrigation__
          - type: custom:mushroom-entity-card
