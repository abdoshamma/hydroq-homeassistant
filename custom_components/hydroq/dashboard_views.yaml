# HydroQ operator dashboard (derived from dashboard2).
# Placeholders resolved at install: __HQ.<key>__  __HAL.<role>__  __HAL.light_N__
# Requires HACS: Mushroom, Bubble Card, Mini Graph Card, Vertical Stack In Card.
views:
  - type: sections
    max_columns: 4
    title: Home
    path: home
    icon: mdi:sprout
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HQ.status__
        name: Status
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HQ.health__
        name: Health
      - type: custom:mushroom-template-badge
        content: Lights
        icon: mdi:lightbulb-group
        color: yellow
        entity: __HQ.grow_lights__
        tap_action:
          action: navigate
          navigation_path: /hydroq/light
        label: ""
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HQ.water_ok__
        name: Water OK
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HAL.water_temp__
        name: Water Temp
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            content: >
              <div style="text-align:center;margin:0.25rem 0 0.5rem;">
              <img src="/hydroq/logo.png" alt="HydroQ — Hydroponic System Controller"
              style="max-width:160px;width:40%;height:auto;" />
              </div>
            grid_options:
              columns: full
          - type: clock
          - type: heading
            heading: Grow Lights
            heading_style: title
            icon: mdi:lightbulb-group
          - type: custom:bubble-card
            card_type: button
            name: Grow Lights
            icon: mdi:lightbulb-group
            entity: __HQ.grow_lights__
            button_type: switch
            show_state: true
            tap_action:
              action: toggle
            grid_options:
              columns: full
          - type: heading
            heading: Total Dissolved Solids
            heading_style: title
            icon: mdi:water-percent
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:mini-graph-card
                entities:
                  - entity: __HAL.tds__
                    name: TDS Level
                hours_to_show: 24
                points_per_hour: 20
                line_width: 2
                font_size: 75
                color_thresholds:
                  - value: 200
                    color: "#3498db"
                  - value: 400
                    color: "#2ecc71"
                  - value: 800
                    color: "#f1c40f"
                  - value: 1500
                    color: "#e74c3c"
                show:
                  points: true
                  fill: true
                  labels: true
                  average: true
                  state: true
                tap_action:
                  action: more-info
              - type: custom:bubble-card
                card_type: separator
                name: Auto EC
                icon: mdi:refresh-auto
                sub_button:
                  - entity: __HQ.auto_ec__
                    tap_action:
                      action: toggle
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.desired_ec_tds__
                name: Desired TDS
                icon: mdi:sprout-outline
                show_state: true
                hold_action:
                  action: more-info
                sub_button:
                  - entity: __HQ.start_nutrients__
                    name: Dose nutrients
                    icon: mdi:play
                    show_name: true
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: __HQ.start_nutrients__
                  - entity: __HQ.start_neutralize__
                    name: Neutralize
                    icon: mdi:water-minus
                    show_name: true
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: __HQ.start_neutralize__
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.ec_tolerance__
                name: EC Tolerance
                show_state: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-fan-card
                    entity: __HAL.nutrient_a__
                    icon_animation: true
                    name: Pump A
                  - type: custom:mushroom-fan-card
                    entity: __HAL.nutrient_b__
                    icon_animation: true
                    name: Pump B
                  - type: custom:mushroom-fan-card
                    entity: __HAL.nutrient_c__
                    icon_animation: true
                    name: Pump C
              - type: custom:mushroom-entity-card
                entity: __HQ.dosing_state__
                name: Dosing State
                icon: mdi:flask
                primary_info: name
                secondary_info: state
              - type: custom:bubble-card
                card_type: button
                entity: __HQ.start_balance__
                name: Balance System
                icon: mdi:scale-balance
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.start_balance__
              - type: custom:bubble-card
                card_type: button
                entity: __HQ.stop_dosing__
                name: Force Stop Dosing
                icon: mdi:close-octagon-outline
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.stop_dosing__
          - type: custom:vertical-stack-in-card
            cards:
              - type: custom:mini-graph-card
                entities:
                  - entity: __HAL.ph__
                    name: pH Level
                hours_to_show: 24
                points_per_hour: 30
                line_width: 2
                font_size: 75
                color_thresholds:
                  - value: 5.5
                    color: "#e74c3c"
                  - value: 5.8
                    color: "#f1c40f"
                  - value: 6
                    color: "#2ecc71"
                  - value: 6.3
                    color: "#2ecc71"
                  - value: 6.5
                    color: "#f1c40f"
                  - value: 7
                    color: "#e74c3c"
                show:
                  points: true
                  fill: true
                  labels: true
                  average: true
                  state: true
                tap_action:
                  action: more-info
              - type: custom:bubble-card
                card_type: separator
                name: Auto pH
                icon: mdi:refresh-auto
                sub_button:
                  - entity: __HQ.auto_ph__
                    tap_action:
                      action: toggle
                    icon: mdi:refresh-auto
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.desired_ph__
                name: Desired pH
                icon: mdi:ph
                show_state: true
                max_value: 14
                min_value: 4
                hold_action:
                  action: more-info
                sub_button:
                  - entity: __HQ.start_ph__
                    name: Dose pH
                    icon: mdi:play
                    show_name: true
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: __HQ.start_ph__
              - type: custom:bubble-card
                card_type: button
                button_type: slider
                entity: __HQ.ph_tolerance__
                name: pH Tolerance
                show_state: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-fan-card
                    entity: __HAL.ph_up__
                    icon_animation: true
                    name: pH Pump
                  - type: custom:mushroom-fan-card
                    entity: __HAL.neutralization__
                    icon_animation: true
                    name: Neutralize
              - type: custom:mushroom-entity-card
                entity: __HQ.dosing_active__
                name: Dosing Active
                icon: mdi:fan-clock
                primary_info: name
                secondary_info: state
              - type: custom:bubble-card
                card_type: button
                entity: __HQ.stop_dosing__
                name: Force Stop
                icon: mdi:close-octagon-outline
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.stop_dosing__
            grid_options:
              columns: 21
              rows: auto
          - type: vertical-stack
            grid_options:
              columns: full
              rows: auto
            cards:
              - type: custom:mushroom-entity-card
                entity: __HQ.auto_irrigation__
                name: Auto Irrigation
                icon: mdi:water-pump
                primary_info: name
                secondary_info: state
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: __HAL.irrigation__
                name: Manual Pump (override)
                icon: mdi:water-pump
                primary_info: name
                secondary_info: state
                tap_action:
                  action: toggle
              - type: markdown
                content: >
                  **Manual Pump** toggles the ESPHome actuator directly (bypasses
                  HydroQ schedule / FSM). Prefer Start / Stop below for normal use.
              - type: custom:mushroom-entity-card
                entity: __HQ.irrigation_active__
                name: Currently Running
                icon: mdi:water-pump
                primary_info: name
                secondary_info: state
              - type: custom:mushroom-entity-card
                entity: __HQ.irrigation_state__
                name: Irrigation State
                icon: mdi:information
                primary_info: name
                secondary_info: state
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: __HQ.start_irrigation__
                    name: Start
                    icon: mdi:play
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: __HQ.start_irrigation__
                  - type: custom:mushroom-entity-card
                    entity: __HQ.stop_irrigation__
                    name: Stop
                    icon: mdi:stop
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: __HQ.stop_irrigation__
                  - type: custom:mushroom-entity-card
                    entity: __HQ.emergency_stop__
                    name: E-Stop
                    icon: mdi:alert-octagon
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: __HQ.emergency_stop__

  - type: sections
    max_columns: 4
    title: Irrigation
    path: irrigation
    icon: mdi:water-pump
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HQ.irrigation_active__
        name: Running
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HQ.irrigation_state__
        name: State
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: __HQ.water_ok__
        name: Water OK
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Smart Irrigation
            heading_style: title
            icon: mdi:water-pump
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: __HQ.auto_irrigation__
                name: Auto Mode
                icon: mdi:water-pump
                primary_info: name
                secondary_info: state
                icon_color: green
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: __HAL.irrigation__
                name: Manual Pump (override)
                icon: mdi:water-pump
                primary_info: name
                secondary_info: state
                icon_color: orange
                tap_action:
                  action: toggle
          - type: markdown
            content: >
              **Manual Pump (override)** talks to ESPHome directly and bypasses the
              HydroQ irrigation FSM. Prefer **Start / Stop** for normal runs.
          - type: heading
            heading: Controls
            heading_style: title
            icon: mdi:gesture-tap-button
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: __HQ.start_irrigation__
                name: Start Irrigation
                icon: mdi:play-circle
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.start_irrigation__
              - type: custom:mushroom-entity-card
                entity: __HQ.stop_irrigation__
                name: Stop Irrigation
                icon: mdi:stop-circle
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.stop_irrigation__
          - type: custom:mushroom-select-card
            entity: __HQ.growth_stage__
            name: Growth Stage
            icon: mdi:sprout
            primary_info: name
            secondary_info: state
          - type: markdown
            content: >
              **Auto Mode ON** — HydroQ runs scheduled irrigation when water is OK.


              **Auto Mode OFF** — use HydroQ Start/Stop (or Manual Pump override).


              Schedule: open the **Schedule** page (up to 5 daily events).

