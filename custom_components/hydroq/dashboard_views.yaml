                icon: mdi:water-pump
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: __HQ.test_irrigation__

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Procedure
            heading_style: subtitle
            icon: mdi:clipboard-list
          - type: markdown
            content: |
              **pH** — follow guide text → wait for **Ready** → **Save detected** (6.86 then 4.0).
              Rejects unstable / wrong-buffer samples.
              **TDS** — 707 ppm ~25°C → wait Ready → Calibrate.
              **DO** — dry tip in air → wait Ready → Air calibration.

